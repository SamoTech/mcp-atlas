<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0L0 0 0 36" fill="none" stroke="#0f1828" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>
  <!-- MCP architecture map (right) -->
  <g opacity="0.2" transform="translate(840,50)">
    <!-- hub -->
    <rect x="145" y="50" width="110" height="44" rx="8" fill="#06b6d4" opacity="0.7"/>
    <text x="200" y="77" font-family="monospace" font-size="13" fill="#fff" text-anchor="middle">MCP Gateway</text>
    <!-- spokes -->
    <line x1="145" y1="72" x2="80"  y2="130" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="200" y1="94" x2="200" y2="130" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="255" y1="72" x2="320" y2="130" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="145" y1="72" x2="30"  y2="160" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <line x1="255" y1="72" x2="370" y2="160" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
    <!-- server nodes -->
    <rect x="40"  y="130" width="80" height="34" rx="6" fill="#0f1828" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="80"  y="152" font-family="monospace" font-size="11" fill="#06b6d4" text-anchor="middle">GitHub</text>
    <rect x="160" y="130" width="80" height="34" rx="6" fill="#0f1828" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="200" y="152" font-family="monospace" font-size="11" fill="#3b82f6" text-anchor="middle">Stripe</text>
    <rect x="280" y="130" width="80" height="34" rx="6" fill="#0f1828" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="320" y="152" font-family="monospace" font-size="11" fill="#06b6d4" text-anchor="middle">Slack</text>
    <!-- evidence badge -->
    <rect x="140" y="190" width="120" height="28" rx="14" fill="#06b6d4" opacity="0.2"/>
    <text x="200" y="209" font-family="monospace" font-size="12" fill="#06b6d4" text-anchor="middle">20 Cases · 9/10 Scored</text>
  </g>
  <!-- logo: globe/atlas mark -->
  <g transform="translate(80,82)" filter="url(#glow)">
    <circle cx="60" cy="60" r="55" fill="#070a14" stroke="url(#acc)" stroke-width="3"/>
    <!-- latitude lines -->
    <ellipse cx="60" cy="60" rx="42" ry="42" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="60" cy="60" rx="42" ry="18" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <ellipse cx="60" cy="40" rx="28" ry="10" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <!-- meridian -->
    <line x1="60" y1="18" x2="60" y2="102" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <!-- pin -->
    <circle cx="60" cy="60" r="6" fill="#06b6d4"/>
    <circle cx="60" cy="60" r="3" fill="#fff"/>
  </g>
  <!-- wordmark -->
  <text x="222" y="95" font-family="'SF Mono',Consolas,monospace" font-size="14" fill="#06b6d4" opacity="0.6" letter-spacing="5">ENTERPRISE MCP REGISTRY</text>
  <text x="218" y="178" font-family="Arial Black,'Arial Bold',sans-serif" font-size="86" font-weight="900" letter-spacing="-3" fill="#f0f8ff">MCP Atlas</text>
  <text x="222" y="215" font-family="'SF Mono',Consolas,monospace" font-size="18" fill="#06b6d4" letter-spacing="3" opacity="0.9">VERIFIED DEPLOYMENTS · ARCHITECTURE PATTERNS</text>
  <rect x="220" y="233" width="560" height="2" fill="url(#acc)" opacity="0.45"/>
  <!-- chips -->
  <rect x="222" y="250" width="110" height="28" rx="14" fill="#06b6d4" opacity="0.15"/>
  <text x="277" y="269" font-family="monospace" font-size="13" fill="#06b6d4" text-anchor="middle">20 Cases</text>
  <rect x="344" y="250" width="120" height="28" rx="14" fill="#3b82f6" opacity="0.15"/>
  <text x="404" y="269" font-family="monospace" font-size="13" fill="#93c5fd" text-anchor="middle">16 Servers</text>
  <rect x="476" y="250" width="140" height="28" rx="14" fill="#06b6d4" opacity="0.15"/>
  <text x="546" y="269" font-family="monospace" font-size="13" fill="#06b6d4" text-anchor="middle">Evidence Scored</text>
</svg>